<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guildford Ladies Golf Club 2026 - 3/20 9:00&9:20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px 20px 28px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
    }
    h1 {
      font-size: 1.3rem;
      margin: 0 0 6px;
      text-align: left;
      line-height: 1.35;
    }
    .sub {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #4b5563;
    }
    .choice {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #111827;
    }
    input[type="radio"] {
      accent-color: #4f46e5;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
      outline: none;
    }
    .btns {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    button {
      cursor: pointer;
    }
    .vote-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      background: #4f46e5;
      color: white;
      box-shadow: 0 8px 16px rgba(79, 70, 229, 0.25);
    }
    .result-btn {
      flex: 1;
      width: auto;
      margin-top: 0;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      font-size: 0.95rem;
    }
    .status {
      font-size: 0.85rem;
      margin-top: 14px;
      text-align: center;
      color: #6b7280;
      line-height: 1.4;
      white-space: normal;
    }
    .closed {
      text-align: center;
      font-size: 0.95rem;
      color: #6b7280;
      margin-top: 14px;
    }
    .results-box {
      margin-top: 18px;
      border-top: 1px solid #e5e7eb;
      padding-top: 14px;
      display: none;
    }
    .results-box h2 {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #26364d;
    }
    .results-box .col {
      margin-bottom: 14px;
    }
    .results-box ul {
      margin: 6px 0 0 18px;
      padding: 0;
      font-size: 0.9rem;
      color: #3b4f6a;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Guildford Ladies Golf Club 2026 - 3/20<br>9:00&amp;9:20</h1>
    <div class="sub">Please make a choice below.</div>

    <div id="formArea">
      <div class="label">Make a choice:</div>

      <label class="choice">
        <input type="radio" name="attend" value="Yes" checked />
        <span>Yes, I can play in one of the tee times.</span>
      </label>

      <label class="choice">
        <input type="radio" name="attend" value="No" />
        <span>No, I will not be able to play.</span>
      </label>

      <div class="label" style="margin-top:12px;">Name (Required)</div>
      <input id="name" type="text" />

      <div class="btns">
        <button class="vote-btn" id="voteBtn">Vote</button>
        <button class="result-btn" id="resultBtn">Results</button>
      </div>

      <div class="status" id="status"></div>

      <div class="results-box" id="resultsBox">
        <div class="col">
          <h2>Attending</h2>
          <ul id="attendList"></ul>
        </div>
        <div class="col">
          <h2>Not attending</h2>
          <ul id="absentList"></ul>
        </div>
      </div>
    </div>

    <div class="closed" id="closedArea" style="display:none;">
      Voting is closed.
    </div>
  </div>

  <script>
    //const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwW1cUtv9CNI0mUFTE6VzFD7Wf8gDIwEBNYBT4WS7thdw__nDuevcQRs-coD_CQDt2BfQ/exec";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoPDq8ekCaILe7BEwOKKdmhUqaffMfXj_8wxwt3tDQEVR57BFMZpCRkL4gj---ATfNdg/exec";

    const nameInput = document.getElementById('name');
    const voteBtn = document.getElementById('voteBtn');
    const resultBtn = document.getElementById('resultBtn');
    const statusEl = document.getElementById('status');
    const resultsBox = document.getElementById('resultsBox');
    const attendList = document.getElementById('attendList');
    const absentList = document.getElementById('absentList');
    const formArea = document.getElementById('formArea');
    const closedArea = document.getElementById('closedArea');

    function selectedAttend() {
      const checked = document.querySelector('input[name="attend"]:checked');
      return checked ? checked.value : '';
    }

    function renderClosed() {
      formArea.style.display = 'none';
      closedArea.style.display = 'block';
    }

    async function fetchStatus() {
      const res = await fetch(SCRIPT_URL + '?mode=status');
      return await res.json();
    }

    async function sendVoteToServer(name, attend) {
      const form = new URLSearchParams();
      form.append('name', name);
      form.append('attend', attend);

      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: form
      });

      return await res.json();
    }

    async function fetchResults() {
      const res = await fetch(SCRIPT_URL + '?mode=results');
      return await res.json();
    }

    function fillList(ul, items) {
      ul.innerHTML = '';
      if (!items || items.length === 0) {
        const li = document.createElement('li');
        li.textContent = '-';
        ul.appendChild(li);
        return;
      }

      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      });
    }

    voteBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const attend = selectedAttend();

      statusEl.textContent = '';
      resultsBox.style.display = 'none';

      if (!name) {
        statusEl.textContent = 'Please enter your name.';
        return;
      }

      try {
        const result = await sendVoteToServer(name, attend);

        if (!result.ok) {
          if (result.error === 'CLOSED') {
            renderClosed();
            return;
          }
          statusEl.textContent = 'Save failed: ' + (result.error || 'Unknown error');
          return;
        }

        statusEl.innerHTML =
          '<strong>' + name + '</strong>, your choice (<strong>' + attend + '</strong>) has been saved.<br>You can change it until the poll is closed.';
      } catch (err) {
        statusEl.textContent = 'Save failed: ' + err;
      }
    });

    resultBtn.addEventListener('click', async () => {
      statusEl.textContent = '';

      try {
        const result = await fetchResults();

        if (!result.ok) {
          statusEl.textContent = 'Failed to load results.';
          return;
        }

        fillList(attendList, result.attends);
        fillList(absentList, result.absents);
        resultsBox.style.display = 'block';
      } catch (err) {
        statusEl.textContent = 'Failed to load results: ' + err;
      }
    });

    (async function init() {
      try {
        const cfg = await fetchStatus();
        if (cfg.ok && cfg.status !== 'start') {
          renderClosed();
        }
      } catch (err) {
        statusEl.textContent = 'Status check failed: ' + err;
      }
    })();
  </script>
</body>
</html>
