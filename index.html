<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guildford Ladies Golf Club 2026 - 3/20 9:00&9:20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      margin: 0;
      padding: 24px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 28px;
      padding: 48px 48px 36px;
    }
    h1 {
      font-size: 42px;
      line-height: 1.25;
      margin: 0 0 22px 0;
      font-weight: 800;
    }
    .sub {
      font-size: 28px;
      color: #5b677a;
      margin-bottom: 34px;
    }
    .label {
      font-size: 30px;
      color: #3b4f6a;
      margin: 26px 0 14px;
    }
    .choice {
      border: 2px solid #d5dbe3;
      border-radius: 22px;
      padding: 24px 28px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 28px;
      color: #3b4f6a;
    }
    input[type="radio"] {
      width: 30px;
      height: 30px;
    }
    input[type="text"] {
      width: 100%;
      font-size: 30px;
      padding: 20px 22px;
      border: 2px solid #d5dbe3;
      border-radius: 18px;
      outline: none;
    }
    .btns {
      display: flex;
      gap: 24px;
      margin-top: 34px;
    }
    button {
      flex: 1;
      font-size: 34px;
      padding: 22px 20px;
      border-radius: 999px;
      cursor: pointer;
    }
    .vote-btn {
      background: #5a54df;
      color: white;
      border: 4px solid #111;
      box-shadow: 0 10px 20px rgba(90,84,223,.18);
      font-weight: 700;
    }
    .result-btn {
      background: white;
      color: #32445f;
      border: 2px solid #d5dbe3;
    }
    .status {
      text-align: center;
      margin-top: 26px;
      font-size: 28px;
      color: #5b677a;
      line-height: 1.4;
      white-space: pre-line;
    }
    .closed {
      text-align: center;
      font-size: 32px;
      color: #a94442;
      margin-top: 20px;
    }
    .results-box {
      margin-top: 28px;
      border-top: 1px solid #e5e7eb;
      padding-top: 24px;
      display: none;
    }
    .results-box h2 {
      margin: 0 0 18px;
      font-size: 28px;
      color: #26364d;
    }
    .results-box .col {
      margin-bottom: 24px;
    }
    .results-box ul {
      margin: 10px 0 0 20px;
      font-size: 24px;
      color: #3b4f6a;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Guildford Ladies Golf Club 2026 - 3/20<br>9:00&amp;9:20</h1>
    <div class="sub">Please make a choice below.</div>

    <div id="formArea">
      <div class="label">Make a choice:</div>

      <label class="choice">
        <input type="radio" name="attend" value="Yes" checked />
        <span>Yes, I can play in one of the tee times.</span>
      </label>

      <label class="choice">
        <input type="radio" name="attend" value="No" />
        <span>No, I will not be able to play.</span>
      </label>

      <div class="label">Name (Required)</div>
      <input id="name" type="text" />

      <div class="btns">
        <button class="vote-btn" id="voteBtn">Vote</button>
        <button class="result-btn" id="resultBtn">Results</button>
      </div>

      <div class="status" id="status"></div>

      <div class="results-box" id="resultsBox">
        <div class="col">
          <h2>Attending</h2>
          <ul id="attendList"></ul>
        </div>
        <div class="col">
          <h2>Not attending</h2>
          <ul id="absentList"></ul>
        </div>
      </div>
    </div>

    <div class="closed" id="closedArea" style="display:none;">
      Voting is closed.
    </div>
  </div>

  <script>
    //const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwW1cUtv9CNI0mUFTE6VzFD7Wf8gDIwEBNYBT4WS7thdw__nDuevcQRs-coD_CQDt2BfQ/exec";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoPDq8ekCaILe7BEwOKKdmhUqaffMfXj_8wxwt3tDQEVR57BFMZpCRkL4gj---ATfNdg/exec";

    const nameInput = document.getElementById('name');
    const voteBtn = document.getElementById('voteBtn');
    const resultBtn = document.getElementById('resultBtn');
    const statusEl = document.getElementById('status');
    const resultsBox = document.getElementById('resultsBox');
    const attendList = document.getElementById('attendList');
    const absentList = document.getElementById('absentList');
    const formArea = document.getElementById('formArea');
    const closedArea = document.getElementById('closedArea');

    function selectedAttend() {
      const checked = document.querySelector('input[name="attend"]:checked');
      return checked ? checked.value : '';
    }

    function renderClosed() {
      formArea.style.display = 'none';
      closedArea.style.display = 'block';
    }

    async function fetchStatus() {
      const res = await fetch(SCRIPT_URL + '?mode=status');
      return await res.json();
    }

    async function sendVoteToServer(name, attend) {
      const form = new URLSearchParams();
      form.append('name', name);
      form.append('attend', attend);

      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: form
      });

      return await res.json();
    }

    async function fetchResults() {
      const res = await fetch(SCRIPT_URL + '?mode=results');
      return await res.json();
    }

    function fillList(ul, items) {
      ul.innerHTML = '';
      if (!items || items.length === 0) {
        const li = document.createElement('li');
        li.textContent = '-';
        ul.appendChild(li);
        return;
      }

      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      });
    }

    voteBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      const attend = selectedAttend();

      statusEl.textContent = '';
      resultsBox.style.display = 'none';

      if (!name) {
        statusEl.textContent = 'Please enter your name.';
        return;
      }

      try {
        const result = await sendVoteToServer(name, attend);

        if (!result.ok) {
          if (result.error === 'CLOSED') {
            renderClosed();
            return;
          }
          statusEl.textContent = 'Save failed: ' + (result.error || 'Unknown error');
          return;
        }

        statusEl.innerHTML =
          '<strong>' + name + '</strong>, your choice (<strong>' + attend + '</strong>) has been saved.<br>You can change it until the poll is closed.';
      } catch (err) {
        statusEl.textContent = 'Save failed: ' + err;
      }
    });

    resultBtn.addEventListener('click', async () => {
      statusEl.textContent = '';

      try {
        const result = await fetchResults();

        if (!result.ok) {
          statusEl.textContent = 'Failed to load results.';
          return;
        }

        fillList(attendList, result.attends);
        fillList(absentList, result.absents);
        resultsBox.style.display = 'block';
      } catch (err) {
        statusEl.textContent = 'Failed to load results: ' + err;
      }
    });

    (async function init() {
      try {
        const cfg = await fetchStatus();
        if (cfg.ok && cfg.status !== 'start') {
          renderClosed();
        }
      } catch (err) {
        statusEl.textContent = 'Status check failed: ' + err;
      }
    })();
  </script>
</body>
</html>
